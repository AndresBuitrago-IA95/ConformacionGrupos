<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Grupos Inteligente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 30px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 25px; max-width: 1200px; margin: auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background-color: #1a5276; color: white; padding: 12px; font-size: 14px; }
        td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; transition: 0.3s; }
        input:focus { border-color: #1a5276; outline: none; background: #f0f7ff; }
        .required { border-left: 4px solid #e74c3c; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: #219150; }
        .warning { color: #e74c3c; font-size: 11px; display: none; margin-top: 4px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-flex">
        <h2>Gestión de Equipos Académicos</h2>
        <button class="btn-add" onclick="agregarGrupo()">+ Agregar Nuevo Grupo</button>
    </div>
    
    <p style="color: #666;">Mínimo 3, máximo 5 integrantes. <b>No se permiten nombres duplicados.</b></p>

    <table id="tablaGrupos">
        <thead>
            <tr>
                <th>Grup.</th>
                <th>Tema a Abordar</th>
                <th>Integrante 1</th>
                <th>Integrante 2</th>
                <th>Integrante 3</th>
                <th>Integrante 4</th>
                <th>Integrante 5</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<datalist id="estudiantes">
    <option value="Jhon Andres Aguirre Chirinos">
    <option value="Diego Alexander Arias Diaz">
    <option value="Maria Paulina Ayala Villegas">
    <option value="Edwin Ferney Banquez Carmona">
    <option value="Jose Daniel Calderin Tenorio">
    <option value="Leidy Yamile Castañeda Cardona">
    <option value="Juan Pablo Echavarria Naranjo">
    <option value="Jhonathan Gallego Gomez">
    <option value="Camilo Andres Gomez Vasco">
    <option value="Jhon Dario Molina Vasquez">
    <option value="Gustavo Adolfo Morales Restrepo">
    <option value="Sebastian Orozco Mendez">
    <option value="Luis Fernando Osuna Florez">
    <option value="Susana Perez Tamayo">
    <option value="Sandra Patricia Ramirez Betancur">
    <option value="Juan Camilo Robledo Gomez">
    <option value="Tomás Roquemen Tangarife">
    <option value="Leandra Magally Sánchez Herrera">
    <option value="Jurith Marcela Tapia Diaz">
    <option value="Juan De Dios Vasquez Velez">
    <option value="Juan David Velez Montoya">
    <option value="Jhon William Zapata Gomez">
</datalist>

<script>
    let contadorGrupos = 0;

    function agregarGrupo() {
        contadorGrupos++;
        const tbody = document.querySelector("#tablaGrupos tbody");
        const fila = document.createElement("tr");
        
        fila.innerHTML = `
            <td style="font-weight:bold">${contadorGrupos}</td>
            <td><input type="text" placeholder="Tema..."></td>
            <td><input type="text" list="estudiantes" class="required member-input" onchange="validarDuplicado(this)"></td>
            <td><input type="text" list="estudiantes" class="required member-input" onchange="validarDuplicado(this)"></td>
            <td><input type="text" list="estudiantes" class="required member-input" onchange="validarDuplicado(this)"></td>
            <td><input type="text" list="estudiantes" class="member-input" onchange="validarDuplicado(this)"></td>
            <td><input type="text" list="estudiantes" class="member-input" onchange="validarDuplicado(this)"></td>
        `;
        tbody.appendChild(fila);
    }

    function validarDuplicado(inputActual) {
        const todosLosInputs = document.querySelectorAll(".member-input");
        const valorActual = inputActual.value.trim().toLowerCase();

        if (valorActual === "") return;

        let coincidencias = 0;
        todosLosInputs.forEach(input => {
            if (input.value.trim().toLowerCase() === valorActual) {
                coincidencias++;
            }
        });

        if (coincidencias > 1) {
            alert("¡Error! El integrante '" + inputActual.value + "' ya ha sido asignado a un grupo.");
            inputActual.value = "";
            inputActual.focus();
        }
    }

    // Inicializar con los 6 grupos que pediste originalmente
    for(let i=0; i<6; i++) { agregarGrupo(); }
</script>

</body>
</html>
