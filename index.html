<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Equipos Académicos - Persistente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 30px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 25px; max-width: 1200px; margin: auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th { background-color: #1a5276; color: white; padding: 12px; font-size: 14px; }
        td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .required { border-left: 4px solid #e74c3c; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #f39c12; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-list { background: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: #219150; }
        .btn-save:hover { background: #d68910; }
        
        #seccionLista { margin-top: 30px; display: none; border-top: 2px solid #1a5276; padding-top: 20px; }
        .grupo-item { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #1a5276; }
        .grupo-item h3 { margin: 0; color: #1a5276; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-flex">
        <h2>Gestión de Equipos Académicos</h2>
        <div>
            <button class="btn-add" onclick="agregarGrupo()">+ Nuevo Grupo</button>
            <button class="btn-save" onclick="guardarProgreso()">💾 Guardar</button>
            <button class="btn-list" onclick="listarGruposConformados()">📄 Listar Finalizados</button>
        </div>
    </div>
    
    <p style="color: #666;">Los datos se guardan en tu navegador. <b>No se permiten duplicados.</b></p>

    <table id="tablaGrupos">
        <thead>
            <tr>
                <th>Grup.</th>
                <th>Tema a Abordar</th>
                <th>Integrante 1</th>
                <th>Integrante 2</th>
                <th>Integrante 3</th>
                <th>Integrante 4</th>
                <th>Integrante 5</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>

    <div id="seccionLista">
        <h2>Resumen de Grupos Guardados</h2>
        <div id="contenedorLista"></div>
    </div>
</div>

<datalist id="estudiantes">
    <option value="Jhon Andres Aguirre Chirinos">
    <option value="Diego Alexander Arias Diaz">
    <option value="Maria Paulina Ayala Villegas">
    <option value="Edwin Ferney Banquez Carmona">
    <option value="Jose Daniel Calderin Tenorio">
    <option value="Leidy Yamile Castañeda Cardona">
    <option value="Juan Pablo Echavarria Naranjo">
    <option value="Jhonathan Gallego Gomez">
    <option value="Camilo Andres Gomez Vasco">
    <option value="Jhon Dario Molina Vasquez">
    <option value="Gustavo Adolfo Morales Restrepo">
    <option value="Sebastian Orozco Mendez">
    <option value="Luis Fernando Osuna Florez">
    <option value="Susana Perez Tamayo">
    <option value="Sandra Patricia Ramirez Betancur">
    <option value="Juan Camilo Robledo Gomez">
    <option value="Tomás Roquemen Tangarife">
    <option value="Leandra Magally Sánchez Herrera">
    <option value="Jurith Marcela Tapia Diaz">
    <option value="Juan De Dios Vasquez Velez">
    <option value="Juan David Velez Montoya">
    <option value="Jhon William Zapata Gomez">
</datalist>

<script>
    let contadorGrupos = 0;

    function agregarGrupo(datos = null) {
        contadorGrupos++;
        const tbody = document.getElementById("cuerpoTabla");
        const fila = document.createElement("tr");
        fila.className = "fila-grupo";
        
        fila.innerHTML = `
            <td style="font-weight:bold">${contadorGrupos}</td>
            <td><input type="text" class="tema-input" value="${datos ? datos.tema : ''}" placeholder="Tema..."></td>
            <td><input type="text" list="estudiantes" value="${datos ? datos.m1 : ''}" class="required member-input" onchange="validarDuplicado(this)"></td>
            <td><input type="text" list="estudiantes" value="${datos ? datos.m2 : ''}" class="required member-input" onchange="validarDuplicado(this)"></td>
            <td><input type="text" list="estudiantes" value="${datos ? datos.m3 : ''}" class="required member-input" onchange="validarDuplicado(this)"></td>
            <td><input type="text" list="estudiantes" value="${datos ? datos.m4 : ''}" class="member-input" onchange="validarDuplicado(this)"></td>
            <td><input type="text" list="estudiantes" value="${datos ? datos.m5 : ''}" class="member-input" onchange="validarDuplicado(this)"></td>
        `;
        tbody.appendChild(fila);
    }

    function validarDuplicado(inputActual) {
        const todosLosInputs = document.querySelectorAll(".member-input");
        const valorActual = inputActual.value.trim().toLowerCase();
        if (valorActual === "") return;

        let coincidencias = 0;
        todosLosInputs.forEach(input => {
            if (input.value.trim().toLowerCase() === valorActual) coincidencias++;
        });

        if (coincidencias > 1) {
            alert("¡Error! El integrante '" + inputActual.value + "' ya está en un grupo.");
            inputActual.value = "";
            inputActual.focus();
        }
    }

    function guardarProgreso() {
        const filas = document.querySelectorAll(".fila-grupo");
        const datosAGuardar = [];

        filas.forEach(fila => {
            const inputs = fila.querySelectorAll("input");
            datosAGuardar.push({
                tema: inputs[0].value,
                m1: inputs[1].value,
                m2: inputs[2].value,
                m3: inputs[3].value,
                m4: inputs[4].value,
                m5: inputs[5].value
            });
        });

        localStorage.setItem("registroGrupos", JSON.stringify(datosAGuardar));
        alert("¡Progreso guardado exitosamente!");
    }

    function listarGruposConformados() {
        const datos = JSON.parse(localStorage.getItem("registroGrupos"));
        if (!datos) {
            alert("No hay datos guardados. Por favor, pulsa 'Guardar' primero.");
            return;
        }

        const contenedor = document.getElementById("contenedorLista");
        const seccion = document.getElementById("seccionLista");
        contenedor.innerHTML = "";
        
        let validos = 0;
        datos.forEach((grupo, index) => {
            const integrantes = [grupo.m1, grupo.m2, grupo.m3, grupo.m4, grupo.m5].filter(n => n !== "");
            if (integrantes.length >= 3) {
                validos++;
                const div = document.createElement("div");
                div.className = "grupo-item";
                div.innerHTML = `<h3>Grupo ${index+1}: ${grupo.tema || 'Sin Tema'}</h3><p>${integrantes.join(", ")}</p>`;
                contenedor.appendChild(div);
            }
        });

        seccion.style.display = validos > 0 ? "block" : "none";
        if(validos > 0) window.scrollTo(0, document.body.scrollHeight);
    }

    // Cargar datos al iniciar o crear los 6 grupos por defecto
    const guardados = JSON.parse(localStorage.getItem("registroGrupos"));
    if (guardados && guardados.length > 0) {
        guardados.forEach(g => agregarGrupo(g));
    } else {
        for(let i=0; i<6; i++) { agregarGrupo(); }
    }
</script>

</body>
</html>
